<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>PlantCam - Scanning in Progress</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&amp;family=Plus+Jakarta+Sans:wght@400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary": "#3e6a00",
                        "on-primary-fixed": "#002107",
                        "on-surface-variant": "#3d4a3c",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "surface-container-high": "#deecdc",
                        "on-tertiary-fixed": "#410004",
                        "surface-variant": "#d8e6d6",
                        "on-primary-fixed-variant": "#00531c",
                        "surface-container-highest": "#d8e6d6",
                        "on-surface": "#131e14",
                        "outline": "#6d7b6b",
                        "inverse-primary": "#53e16f",
                        "surface-bright": "#effded",
                        "background": "#effded",
                        "surface-dim": "#d0dece",
                        "tertiary": "#9c413d",
                        "on-tertiary-fixed-variant": "#7e2a27",
                        "on-primary-container": "#004d1a",
                        "on-error": "#ffffff",
                        "on-background": "#131e14",
                        "surface": "#effded",
                        "primary": "#006e28",
                        "secondary-fixed-dim": "#9ed75b",
                        "inverse-surface": "#273329",
                        "secondary-fixed": "#b9f474",
                        "tertiary-fixed-dim": "#ffb3ad",
                        "on-error-container": "#93000a",
                        "inverse-on-surface": "#e7f5e4",
                        "primary-fixed-dim": "#53e16f",
                        "error-container": "#ffdad6",
                        "error": "#ba1a1a",
                        "tertiary-fixed": "#ffdad7",
                        "primary-container": "#34c759",
                        "secondary-container": "#b9f474",
                        "surface-container-low": "#eaf7e7",
                        "surface-container": "#e4f2e2",
                        "on-primary": "#ffffff",
                        "on-tertiary-container": "#772523",
                        "on-secondary-container": "#437000",
                        "on-secondary-fixed-variant": "#2e4f00",
                        "surface-tint": "#006e28",
                        "primary-fixed": "#72fe88",
                        "outline-variant": "#bccbb8",
                        "on-secondary": "#ffffff",
                        "tertiary-container": "#ff8e86",
                        "on-secondary-fixed": "#0f2000"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        @keyframes scan-line {
            0% {
                transform: translateY(0);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                transform: translateY(320px);
                opacity: 0;
            }
        }

        @keyframes spinner-rotate {
            to {
                transform: rotate(360deg);
            }
        }

        .animate-scan {
            animation: scan-line 2.5s ease-in-out infinite;
        }

        .animate-spin-slow {
            animation: spinner-rotate 2s linear infinite;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background text-on-background font-body min-h-screen">
    <!-- Main Canvas Content (Blurred Background for Context) -->
    <main class="w-full min-h-screen px-6 py-20 flex flex-col items-center">
        <header class="w-full max-w-md flex justify-between items-center mb-12">
            <h1 class="font-headline font-black text-2xl tracking-tighter text-primary">Botanical Atelier</h1>
            <span class="material-symbols-outlined text-on-surface">menu</span>
        </header>
        <div class="w-full max-w-md grid grid-cols-2 gap-4">
            <div class="aspect-[4/5] bg-surface-container-high rounded-3xl overflow-hidden shadow-sm">
                <img class="w-full h-full object-cover grayscale opacity-50"
                    data-alt="vibrant green monstera leaf close up with morning dew on its surface and bright natural lighting"
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuDCYX7xdLqZtjIFcsDsngjBciM5hXAi7c0oGMQy-zQNRuwgAPJ4n4pWNv1ftajrHHFKVWllnkTauoAPXOyJC8UZxEUKwX_UgPUDd4qJGFwhQBBhm6skJILaIOAbve0L3FVTwru1CAA_fyYLi9wwS6UcNGk7rb0tmkyr1vBmOTZTaCvCGOZQU8cilqbOkKsqI2IdLvvcexCuL1yWpg4m-hBvHZlwafKojeyL3PNF11akiXFPUPGhys0uQT72hgu8jqK0PKoM9BDeu3jU" />
            </div>
            <div class="aspect-[4/5] bg-surface-container-high rounded-3xl overflow-hidden shadow-sm">
                <img class="w-full h-full object-cover grayscale opacity-50"
                    data-alt="close up of an olive plant branch with soft sunlight filtering through the leaves against a neutral background"
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuClyEVEd0b9txcS9vJNGp5TH9m-GnCrFrVHbpLtWWi2IEz5FWIhHAVh4-e3aJLSEVwNK6uooR8YDk0I5hgVV9ex8gHuO5hnKPoSO-k6_JabZt1-DfKU78zrFd-kuB28f_aTS9MOt1C28945hOoE0D21GFjPatsspcgSmX_nWSfB6kou-zyZOlXOuSC2fJFK0NqgzrLiwXWgt5xhhF76Hqnd-_SDJoo0CT73fNqiVfOI8fFqWc8UoQmGHBt92ECIIc2lgjNx2breTUpU" />
            </div>
        </div>
    </main>
    <!-- Modal Backdrop -->
    <div class="fixed inset-0 z-[60] flex items-center justify-center px-6 bg-white/70 backdrop-blur-[12px]">
        <!-- Modal Container -->
        <div
            class="w-full max-w-md bg-surface-container-lowest rounded-[2rem] overflow-hidden shadow-[0_8px_32px_rgba(19,30,20,0.08)] flex flex-col items-center text-center p-8 relative">
            <!-- Header -->
            <h2 class="font-headline font-bold text-2xl text-on-surface mb-8 tracking-tight">Analyzing Plant...</h2>
            <!-- Scanning Visual Content -->
            <div
                class="relative w-full aspect-square max-w-[320px] rounded-[1.5rem] overflow-hidden bg-surface-container-low mb-8 shadow-inner">
                <img class="w-full h-full object-cover"
                    data-alt="vibrant prayer plant leaf with intricate pink veins and dark green patterns under focused studio lighting"
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuCxv4FqNRl5v3obFlEaqlhIZ5sogaQulzXfpPHoJZpmketSuV71CEHUYE1ZCu2Op54UapQv4LbDke2GuQHA3n0PXeGm8BpK2r2dVaTZQ9R6WqYLXAW7sB8mFS7lAGx84Wsm7128NcImeFXTkeQ3-aYCJqpzKhQSAPApSDCCPkIleQGZ9FnwbA7kmarXb8aaKP7TMbSaxCRaNeNgqizGlRGAWuQyg6wUsUK2SvRl5inwn8LKAF6LDtnYGtpw2vUTdOmvvFbKvR2RViqH" />
                <!-- Scanning Overlay & Line -->
                <div class="absolute inset-0 bg-primary/10"></div>
                <div
                    class="absolute top-0 left-0 w-full h-1 bg-primary-container shadow-[0_0_15px_#34c759] animate-scan">
                </div>
                <!-- Corner Focus Brackets -->
                <div class="absolute top-6 left-6 w-8 h-8 border-t-2 border-l-2 border-white/80 rounded-tl-lg"></div>
                <div class="absolute top-6 right-6 w-8 h-8 border-t-2 border-r-2 border-white/80 rounded-tr-lg"></div>
                <div class="absolute bottom-6 left-6 w-8 h-8 border-b-2 border-l-2 border-white/80 rounded-bl-lg"></div>
                <div class="absolute bottom-6 right-6 w-8 h-8 border-b-2 border-r-2 border-white/80 rounded-br-lg">
                </div>
            </div>
            <!-- Status Indicator -->
            <div class="flex flex-col items-center gap-4 mb-6">
                <div class="relative w-12 h-12 flex items-center justify-center">
                    <svg class="absolute inset-0 w-full h-full -rotate-90" viewbox="0 0 48 48">
                        <circle class="text-surface-container-high" cx="24" cy="24" fill="transparent" r="20"
                            stroke="currentColor" stroke-width="4"></circle>
                        <circle class="text-primary animate-spin-slow" cx="24" cy="24" fill="transparent" r="20"
                            stroke="currentColor" stroke-dasharray="126" stroke-dashoffset="60" stroke-linecap="round"
                            stroke-width="4"></circle>
                    </svg>
                    <span class="material-symbols-outlined text-primary text-xl">auto_awesome</span>
                </div>
                <div class="space-y-1">
                    <p class="font-body font-medium text-on-surface">Identifying disease...</p>
                    <p class="font-body text-sm text-outline">Identifying species and checking for diseases...</p>
                </div>
            </div>
            <!-- Footer Action -->
            <button
                class="w-full py-4 text-primary font-body font-bold hover:bg-surface-container-low transition-colors rounded-2xl active:scale-95 duration-200">
                Cancel
            </button>
            <!-- Tonal Accent -->
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-primary to-primary-container"></div>
        </div>
    </div>
    <!-- Navigation Shell (Suppressed context check: Hidden on transaction/loading modal) -->
    <nav
        class="fixed bottom-0 left-0 w-full flex justify-around items-end px-6 pb-8 pt-4 bg-surface/80 backdrop-blur-xl rounded-t-[2rem] shadow-[0_-8px_32px_rgba(19,30,20,0.05)] z-50 md:hidden">
        <div class="flex flex-col items-center justify-center text-stone-400 p-2">
            <span class="material-symbols-outlined mb-1">search</span>
            <span class="font-['Plus_Jakarta_Sans'] font-medium text-[10px] uppercase tracking-widest">Explore</span>
        </div>
        <!-- Active Tab: Identify -->
        <div
            class="flex flex-col items-center justify-center bg-primary-container text-white rounded-full p-3 mb-2 scale-110 shadow-lg">
            <span class="material-symbols-outlined"
                style="font-variation-settings: 'FILL' 1;">center_focus_strong</span>
        </div>
        <div class="flex flex-col items-center justify-center text-stone-400 p-2">
            <span class="material-symbols-outlined mb-1">local_florist</span>
            <span class="font-['Plus_Jakarta_Sans'] font-medium text-[10px] uppercase tracking-widest">Garden</span>
        </div>
        <div class="flex flex-col items-center justify-center text-stone-400 p-2">
            <span class="material-symbols-outlined mb-1">person</span>
            <span class="font-['Plus_Jakarta_Sans'] font-medium text-[10px] uppercase tracking-widest">Profile</span>
        </div>
    </nav>
</body>

</html>
